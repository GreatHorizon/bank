{{- if and .Values.global.grafana .Values.global.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.grafana.name }}
  labels:
    app: {{ .Values.global.grafana.name }}
    {{- include "banking-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.global.grafana.service.type }}
  selector:
    app: {{ .Values.global.grafana.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.global.grafana.service.port }}
      targetPort: http
      {{- if eq .Values.global.grafana.service.type "NodePort" }}
      nodePort: {{ .Values.global.grafana.service.nodePort }}
      {{- end }}
{{- end }}