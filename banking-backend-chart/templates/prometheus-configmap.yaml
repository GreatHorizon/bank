{{- if and .Values.global.prometheus .Values.global.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: {{ .Values.global.prometheus.name }}
    {{- include "banking-backend.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: "gateway"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: [ "gateway:80" ]

      - job_name: "accounts-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: [ "accounts-service:8080" ]

      - job_name: "cash-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: [ "cash-service:8080" ]

      - job_name: "transfer-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: [ "transfer-service:8080" ]

      - job_name: "notifications-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: [ "notifications-service:8080" ]
      - job_name: "front"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: [ "front:80" ]

  alerts.yml: |
    groups:
      - name: banking-alerts
        rules:
          - alert: HighHttp5xxRate
            expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) by (application) > 0.1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx rate in {{ "{{ $labels.application }}" }}"
              description: "Application {{ "{{ $labels.application }}" }} has high rate of HTTP 5xx responses."
          - alert: HighHttp4xxRate
            expr: sum(rate(http_server_requests_seconds_count{status=~"4.."}[1m])) by (application) > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High 4xx rate in {{ "{{ $labels.application }}" }}"
              description: "Application {{ "{{ $labels.application }}" }} has high rate of HTTP 4xx responses."
          - alert: HighHttpLatencyP95
            expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application)) > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency in {{ "{{ $labels.application }}" }}"
              description: "Application {{ "{{ $labels.application }}" }} has p95 HTTP latency above 1 second."
          - alert: FailedCashWithdrawals
            expr: sum(rate(cash_withdrawal_failed_total[1m])) by (login) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Failed cash withdrawal for {{ "{{ $labels.login }}" }}"
              description: "User {{ "{{ $labels.login }}" }} has failed cash withdrawal attempts."
          - alert: FailedTransfers
            expr: sum(rate(transfer_failed_total[1m])) by (from_login, to_login) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Failed transfer from {{ "{{ $labels.from_login }}" }} to {{ "{{ $labels.to_login }}" }}"
              description: "Failed transfer detected from {{ "{{ $labels.from_login }}" }} to {{ "{{ $labels.to_login }}" }}."
          - alert: FailedNotifications
            expr: sum(rate(notification_send_failed_total[1m])) by (login) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Failed notification for {{ "{{ $labels.login }}" }}"
              description: "Notification service failed to send notification for user {{ "{{ $labels.login }}" }}."
          - alert: HighJvmHeapUsage
            expr: sum(jvm_memory_used_bytes{area="heap"}) by (application) / sum(jvm_memory_max_bytes{area="heap"}) by (application) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High JVM heap usage in {{ "{{ $labels.application }}" }}"
              description: "Application {{ "{{ $labels.application }}" }} uses more than 80% of JVM heap."
          - alert: ServiceDown
            expr: up == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Service {{ "{{ $labels.job }}" }} is down"
              description: "Prometheus cannot scrape {{ "{{ $labels.job }}" }} at {{ "{{ $labels.instance }}" }}."
{{- end }}