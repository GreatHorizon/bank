{{- if and .Values.global.elk .Values.global.elk.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.elk.kibana.name }}
  labels:
    app: {{ .Values.global.elk.kibana.name }}
    {{- include "banking-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.global.elk.kibana.service.type }}
  selector:
    app: {{ .Values.global.elk.kibana.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.global.elk.kibana.service.port }}
      targetPort: http
      {{- if eq .Values.global.elk.kibana.service.type "NodePort" }}
      nodePort: {{ .Values.global.elk.kibana.service.nodePort }}
      {{- end }}
{{- end }}