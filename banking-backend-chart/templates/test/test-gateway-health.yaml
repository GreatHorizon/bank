apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-gateway-health"
  labels:
    app.kubernetes.io/name: "{{ .Release.Name }}-test-gateway-health"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -e

          echo "Testing gateway health..."

          curl -f -s http://{{ .Values.gateway.name }}:{{ .Values.gateway.service.port }}/actuator/health

          echo "Gateway health OK"