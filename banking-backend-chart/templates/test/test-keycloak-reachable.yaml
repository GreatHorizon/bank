apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-keycloak-reachable"
  labels:
    app.kubernetes.io/name: "{{ .Release.Name }}-test-keycloak-reachable"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -e

          echo "Testing Keycloak issuer..."

          curl -f -v {{ .Values.global.keycloak.issuerUri }}/.well-known/openid-configuration

          echo "Keycloak reachable OK"