apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    app: {{ .Values.gateway.name }}
    {{- include "banking-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Values.gateway.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.port }}
      {{- if and .Values.gateway.service.nodePort (or (eq (.Values.gateway.service.type | default "ClusterIP") "NodePort") (eq (.Values.gateway.service.type | default "ClusterIP") "LoadBalancer")) }}
      nodePort: {{ .Values.gateway.service.nodePort }}
      {{- end }}