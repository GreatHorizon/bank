{{- range $key, $svc := .Values.services }}
{{- if and $svc.db $svc.db.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $svc.db.name }}
  labels:
    app: {{ $svc.db.name }}
spec:
  serviceName: {{ $svc.db.name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ $svc.db.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.db.name }}
    spec:
      containers:
        - name: postgres
          image: {{ $svc.db.image }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy | default "IfNotPresent" }}

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

          ports:
            - name: postgres
              containerPort: {{ $svc.db.port }}

          resources:
            {{- toYaml ($svc.db.resources | default dict) | nindent 12 }}

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          env:
            - name: POSTGRES_DB
              value: {{ $svc.db.database | quote }}

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.db.name }}-secret
                  key: username

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.db.name }}-secret
                  key: password

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ $svc.db.storage }}
---
{{- end }}
{{- end }}