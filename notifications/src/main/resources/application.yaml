spring:
  application:
    name: notifications
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: notification-service
            client-secret: ${CLIENT_SECRET}
            scope: openid
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}

      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
server:
  port: ${SERVER_PORT:8082}
