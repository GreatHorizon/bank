spring:
  application:
    name: transfer            # Логическое имя сервиса
  config:
    import: "optional:consul:"
  cloud:
    consul:
      host: localhost          # Адрес Consul (по умолчанию localhost)
      port: 8500               # Порт Consul (8500 по умолчанию)
      discovery:
        service-name: transfer  # Необязательно, по умолчанию берётся spring.application.name
      config:
        enabled: true            # Включаем Consul Config для внешней конфигурации
        prefix: config           # Префикс в KV-хранилище Consul (по умолчанию "config")
        defaultContext: application  # Контекст по умолчанию
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: transfer-service
            client-secret: ${CLIENT_SECRET}
            scope: openid
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/master
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/master
server:
  port: 8083