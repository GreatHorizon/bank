server:
  port: 8085

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: accounts_service_routes
              uri: ${ACCOUNTS_SERVICE_URL}
              predicates:
                - Path=/accounts,/accounts/**
            - id: cash_service_routes
              uri: ${CASH_SERVICE_URL}
              predicates:
                - Path=/api/cash,/api/cash/**
            - id: transfer_cash_service
              uri: ${TRANSFER_SERVICE_URL}
              predicates:
                - Path=/api/transfer, /api/transfer/**
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        http.client.requests: 0.5, 0.95, 0.99
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: true
        endpoint: ${MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT:http://127.0.0.1:9411/api/v2/spans}