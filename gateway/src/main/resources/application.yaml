server:
  port: 8085

spring:
  application:
    name: gateway

  config:
    import: "optional:consul:"

  cloud:
    consul:
      host: localhost
      port: 8500

      discovery:
        service-name: gateway

      config:
        enabled: true
        prefixes:
          - config
        default-context: application

    gateway:
      server:
        webmvc:
          routes:
            - id: accounts_service_routes
              uri: http://localhost:8080
              predicates:
                - Path=/accounts,/accounts/**
            - id: cash_service_routes
              uri: http://localhost:8081
              predicates:
                - Path=/api/cash,/api/cash/**
            - id: transfer_cash_service
              uri: http://localhost:8083
              predicates:
                - Path=/api/transfer, /api/transfer/**
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway