global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["gateway:80"]

  - job_name: "accounts-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["accounts-service:8080"]

  - job_name: "cash-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["cash-service:8080"]

  - job_name: "transfer-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["transfer-service:8080"]

  - job_name: "notifications-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["notifications-service:8080"]

  - job_name: "front"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "front:80" ]