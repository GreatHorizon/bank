groups:
  - name: banking-alerts
    rules:
      - alert: HighHttp5xxRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) by (application) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate in {{ $labels.application }}"

      - alert: HighHttpLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application)) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency in {{ $labels.application }}"

      - alert: FailedCashWithdrawals
        expr: sum(rate(cash_withdrawal_failed_total[1m])) by (login) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Failed cash withdrawal for {{ $labels.login }}"

      - alert: FailedTransfers
        expr: sum(rate(transfer_failed_total[1m])) by (from_login, to_login) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Failed transfer from {{ $labels.from_login }} to {{ $labels.to_login }}"

      - alert: FailedNotifications
        expr: sum(rate(notification_send_failed_total[1m])) by (login) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Failed notification for {{ $labels.login }}"

      - alert: HighJvmHeapUsage
        expr: sum(jvm_memory_used_bytes{area="heap"}) by (application) / sum(jvm_memory_max_bytes{area="heap"}) by (application) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage in {{ $labels.application }}"